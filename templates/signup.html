<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <title>회원가입</title>
  <link rel="stylesheet" href="/static/css/auth.css" />
  <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
  <div class="layout">
    <header class="header">
      <div class="logo">FinanceBoard</div>
      <div class="header-right">
        <span id="serverTime">데이터 수신 준비중</span>
      </div>
    </header>

    <aside class="sidebar">
      <h2>거래 메뉴</h2>
      <ul class="gnb-menu">
        <li><button class="gnb-button" onclick="location.href='/dashboard'">주식 거래</button></li>
      </ul>

      <h2 style="margin-top:20px;">게시판</h2>
      <ul class="gnb-menu">
        <li><button class="gnb-button" onclick="location.href='/board/list'">글 목록</button></li>
        <li><button class="gnb-button" onclick="location.href='/board/write'">글 작성</button></li>
      </ul>
    </aside>

    <main class="main">
      <div class="container">
        <h2>회원가입</h2>
        <input id="name" placeholder="이름" />
        <input id="user_id" placeholder="아이디" />
        <input id="password" type="password" placeholder="비밀번호" />
        <button onclick="signup()">가입하기</button>
        <div><a href="/login">로그인</a> 하러가기</div>
      </div>
    </main>
  </div>

  <script>
    async function signup() {
      const name = document.getElementById('name').value;
      const user_id = document.getElementById('user_id').value;
      const password = document.getElementById('password').value;

      const res = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, user_id, password })
      });

      const data = await res.json();

      if (data.success) {
        alert('회원가입 성공');
        location.href = '/login';
      } else {
        alert('회원가입 실패');
      }
    }
  </script>
</body>

</html>
