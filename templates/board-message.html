<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>처리 결과</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #f2f4f6;
            font-family: Arial, sans-serif;
            color: #191f28;
        }

        .page {
            max-width: 520px;
            margin: 0 auto;
            padding: 100px 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        h1 {
            margin: 0 0 14px;
            font-size: 30px;
            font-weight: 700;
        }

        p {
            margin: 0 0 28px;
            font-size: 16px;
            color: #4e5968;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 14px 22px;
            border-radius: 16px;
            background: #3182f6;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
        }

        .btn:hover {
            background: #1b64da;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>{{title}}</h1>
            <p>{{message}}</p>
            <a class="btn" href="/board/list">목록으로 이동</a>
        </div>
    </div>
</body>
</html>
